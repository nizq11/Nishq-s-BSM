<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BSM & NN</title>

<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
  }

  .header {
    background: #020617;
    padding: 20px 40px;
    font-size: 24px;
    font-weight: bold;
    border-bottom: 1px solid #1e293b;
  }

  .container {
    padding: 40px;
    max-width: 900px;
    margin: auto;
  }

  .card {
    background: #020617;
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  }

  h2 {
    margin-top: 0;
    color: #38bdf8;
  }

  input, select {
    padding: 10px;
    margin: 6px;
    border-radius: 6px;
    border: none;
    width: 150px;
    background: #1e293b;
    color: white;
  }

  button {
    padding: 10px 15px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #0ea5e9;
  }

  .result {
    margin-top: 12px;
    font-size: 18px;
    color: #22c55e;
  }

  .info {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 10px;
  }
</style>
</head>

<body>

<div class="header">BSM & NN</div>

<div class="container">

<div class="card">
<h2>BSM Model</h2>

<div class="info">
S = Spot price | K = Strike | r = risk-free rate (%)<br>
q = dividend / foreign rate (%) | σ = volatility (%) | T = time (years)
</div>

<select id="type">
<option value="call">Call</option>
<option value="put">Put</option>
</select><br>

<input id="S" placeholder="S">
<input id="K" placeholder="K">
<input id="r" placeholder="r (%)">
<input id="q" placeholder="q (%)">
<input id="sigma" placeholder="σ (%)">
<input id="T" placeholder="T"><br>

<button onclick="priceBSM()">Calculate</button>
<div class="result" id="bsmResult"></div>
</div>

<div class="card">
<h2>Black Model (Futures)</h2>

<div class="info">
F = Futures price | K = Strike | r = rate (%)<br>
σ = volatility (%) | T = time (years)
</div>

<select id="typeF">
<option value="call">Call</option>
<option value="put">Put</option>
</select><br>

<input id="F" placeholder="F">
<input id="Kf" placeholder="K">
<input id="rf" placeholder="r (%)">
<input id="sigmaf" placeholder="σ (%)">
<input id="Tf" placeholder="T"><br>

<button onclick="priceBlack()">Calculate</button>
<div class="result" id="blackResult"></div>
</div>

</div>

<script>
function N(x) {
  return (1 + erf(x / Math.sqrt(2))) / 2;
}

function erf(x) {
  let sign = x >= 0 ? 1 : -1;
  x = Math.abs(x);

  let t = 1 / (1 + 0.3275911 * x);
  let y = 1 - (((((1.061405429*t - 1.453152027)*t + 1.421413741)*t
        - 0.284496736)*t + 0.254829592)*t) * Math.exp(-x*x);

  return sign * y;
}

// convert % → decimal safely
function toDecimal(x) {
  return parseFloat(x) / 100;
}

function priceBSM() {
  let S = parseFloat(S.value);
  let K = parseFloat(K.value);
  let r = toDecimal(document.getElementById("r").value);
  let q = toDecimal(document.getElementById("q").value);
  let sigma = toDecimal(document.getElementById("sigma").value);
  let T = parseFloat(T.value);
  let type = document.getElementById("type").value;

  let d1 = (Math.log(S/K) + (r - q + 0.5*sigma*sigma)*T) / (sigma*Math.sqrt(T));
  let d2 = d1 - sigma*Math.sqrt(T);

  let price = type === "call"
    ? S*Math.exp(-q*T)*N(d1) - K*Math.exp(-r*T)*N(d2)
    : K*Math.exp(-r*T)*N(-d2) - S*Math.exp(-q*T)*N(-d1);

  document.getElementById("bsmResult").innerText = "Price: " + price.toFixed(4);
}

function priceBlack() {
  let F = parseFloat(F.value);
  let K = parseFloat(Kf.value);
  let r = toDecimal(document.getElementById("rf").value);
  let sigma = toDecimal(document.getElementById("sigmaf").value);
  let T = parseFloat(Tf.value);
  let type = document.getElementById("typeF").value;

  let d1 = (Math.log(F/K) + 0.5*sigma*sigma*T) / (sigma*Math.sqrt(T));
  let d2 = d1 - sigma*Math.sqrt(T);

  let price = type === "call"
    ? Math.exp(-r*T)*(F*N(d1) - K*N(d2))
    : Math.exp(-r*T)*(K*N(-d2) - F*N(-d1));

  document.getElementById("blackResult").innerText = "Price: " + price.toFixed(4);
}
</script>

</body>
</html>
