<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BSM & NN</title>

<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
  }

  .header {
    background: #020617;
    padding: 20px 40px;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #1e293b;
  }

  .container {
    max-width: 900px;
    margin: auto;
    padding: 40px;
  }

  .card {
    background: #020617;
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 30px;
  }

  h2 {
    color: #38bdf8;
    margin-top: 0;
  }

  input, select {
    padding: 10px;
    margin: 6px;
    border-radius: 6px;
    border: none;
    width: 150px;
    background: #1e293b;
    color: white;
  }

  button {
    padding: 10px 15px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
  }

  .result {
    margin-top: 12px;
    font-size: 18px;
    color: #22c55e;
  }

  .info {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 10px;
  }
</style>
</head>

<body>

<div class="header">BSM & NN</div>

<div class="container">

<!-- BSM -->
<div class="card">
<h2>BSM Model</h2>

<div class="info">
S = Spot price | K = Strike<br>
r = Risk-free rate (%) | q = Dividend/FX rate (%)<br>
σ = Volatility (%) | T = Time (years)
</div>

<select id="type">
<option value="call">Call</option>
<option value="put">Put</option>
</select><br>

<input id="S" placeholder="S">
<input id="K" placeholder="K">
<input id="r" placeholder="r (%)">
<input id="q" placeholder="q (%)">
<input id="sigma" placeholder="σ (%)">
<input id="T" placeholder="T"><br>

<button onclick="priceBSM()">Calculate</button>
<div class="result" id="bsmResult"></div>
</div>

<!-- BLACK -->
<div class="card">
<h2>Black Model (Futures)</h2>

<div class="info">
F = Futures price | K = Strike<br>
r = Risk-free rate (%) | σ = Volatility (%)<br>
T = Time (years)
</div>

<select id="typeF">
<option value="call">Call</option>
<option value="put">Put</option>
</select><br>

<input id="F" placeholder="F">
<input id="Kf" placeholder="K">
<input id="rf" placeholder="r (%)">
<input id="sigmaf" placeholder="σ (%)">
<input id="Tf" placeholder="T"><br>

<button onclick="priceBlack()">Calculate</button>
<div class="result" id="blackResult"></div>
</div>

</div>

<script>

// Normal CDF
function N(x) {
  return 0.5 * (1 + erf(x / Math.sqrt(2)));
}

// Error function
function erf(x) {
  let sign = x >= 0 ? 1 : -1;
  x = Math.abs(x);

  let t = 1 / (1 + 0.3275911 * x);
  let y = 1 - (((((1.061405429*t - 1.453152027)*t + 1.421413741)*t
        - 0.284496736)*t + 0.254829592)*t) * Math.exp(-x*x);

  return sign * y;
}

// % → decimal
function toDecimal(x) {
  return parseFloat(x) / 100;
}

// BSM
function priceBSM() {
  let S = parseFloat(document.getElementById("S").value);
  let K = parseFloat(document.getElementById("K").value);
  let r = toDecimal(document.getElementById("r").value);
  let q = toDecimal(document.getElementById("q").value);
  let sigma = toDecimal(document.getElementById("sigma").value);
  let T = parseFloat(document.getElementById("T").value);
  let type = document.getElementById("type").value;

  if ([S,K,r,q,sigma,T].some(v => isNaN(v))) {
    alert("Fill all fields correctly");
    return;
  }

  let d1 = (Math.log(S/K) + (r - q + 0.5*sigma*sigma)*T) / (sigma*Math.sqrt(T));
  let d2 = d1 - sigma*Math.sqrt(T);

  let price;
  if (type === "call") {
    price = S*Math.exp(-q*T)*N(d1) - K*Math.exp(-r*T)*N(d2);
  } else {
    price = K*Math.exp(-r*T)*N(-d2) - S*Math.exp(-q*T)*N(-d1);
  }

  document.getElementById("bsmResult").innerText = "Price: " + price.toFixed(4);
}

// BLACK MODEL
function priceBlack() {
  let F = parseFloat(document.getElementById("F").value);
  let K = parseFloat(document.getElementById("Kf").value);
  let r = toDecimal(document.getElementById("rf").value);
  let sigma = toDecimal(document.getElementById("sigmaf").value);
  let T = parseFloat(document.getElementById("Tf").value);
  let type = document.getElementById("typeF").value;

  if ([F,K,r,sigma,T].some(v => isNaN(v))) {
    alert("Fill all fields correctly");
    return;
  }

  let d1 = (Math.log(F/K) + 0.5*sigma*sigma*T) / (sigma*Math.sqrt(T));
  let d2 = d1 - sigma*Math.sqrt(T);

  let price;
  if (type === "call") {
    price = Math.exp(-r*T)*(F*N(d1) - K*N(d2));
  } else {
    price = Math.exp(-r*T)*(K*N(-d2) - F*N(-d1));
  }

  document.getElementById("blackResult").innerText = "Price: " + price.toFixed(4);
}

</script>

</body>
</html>
